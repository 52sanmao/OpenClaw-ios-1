name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Lower deployment target for CI compatibility
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 26.2/IPHONEOS_DEPLOYMENT_TARGET = 18.0/g' OpenClaw.xcodeproj/project.pbxproj

      - name: Resolve Swift package dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project "OpenClaw.xcodeproj" \
            -scheme "OpenClaw"

      - name: Build for iOS (No Archive)
        run: |
          set -euo pipefail
          xcodebuild \
            -project "OpenClaw.xcodeproj" \
            -scheme "OpenClaw" \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create IPA from app
        run: |
          set -euo pipefail
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r "çˆªæŽ§-ircon1.ipa" Payload
          echo "IPA created at $RUNNER_TEMP/çˆªæŽ§-ircon1.ipa"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: çˆªæŽ§-ircon1-IPA
          path: ${{ runner.temp }}/çˆªæŽ§-ircon1.ipa
          retention-days: 30
